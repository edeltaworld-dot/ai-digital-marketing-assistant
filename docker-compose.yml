version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ai-marketing-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ai-marketing-assistant
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-marketing-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-marketing-backend
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ai-marketing-assistant?authSource=admin
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      JWT_EXPIRE: 7d
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src
    networks:
      - ai-marketing-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-marketing-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ai-marketing-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  ai-marketing-network:
    driver: bridge
